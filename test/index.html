<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" ng-app="testClientApp">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="styles.css">

  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
  <link rel="manifest" href="/manifest.json">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="theme-color" content="#ffffff">

  <script src="angular.js"></script>
  <script src="angular-uuid.js"></script>
  <script src="test-client.js"></script>

  <title>7 Wonders Test Client</title>
</head>
<body>
  <div ng-controller="TestClientCtrl as testClient">

    <div class="user-id-section">
      <div class="user-id-label">User ID:</div>
      <div class="user-id">{{testClient.userId}}</div>
      <button class="user-id-generate" ng-click="testClient.generateUserId()">Generate new</button>
    </div>

  </div>
</body>
</html>
